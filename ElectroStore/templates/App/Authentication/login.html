<!DOCTYPE html>

{% load socialaccount %}

<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
          background: linear-gradient(135deg, #f12711 0%, #f5af19 100%);
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
          margin: 0;
          padding: 20px;
        }

        form {
          background: white;
          padding: 40px;
          border-radius: 20px;
          box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
          width: 100%;
          max-width: 400px;
          text-align: center;
          animation: fadeInUp 0.5s ease-out;
        }

        /* Icon */
        .icon {
          font-size: 3rem;
          color: #FFA500;
          margin-bottom: 20px;
        }

        .icon i {
          background: linear-gradient(135deg, #FFA500, #FF8C00);
          -webkit-background-clip: text;
          background-clip: text;
          color: transparent;
          font-size: 3rem;
        }

        /* Alert Messages */
        .alert {
          padding: 12px 16px;
          margin-bottom: 20px;
          border-radius: 10px;
          font-size: 0.85rem;
          text-align: center;
          animation: slideIn 0.3s ease-out;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 8px;
        }

        /* Labels */
        form label {
          display: block;
          text-align: left;
          margin-bottom: 8px;
          font-weight: 600;
          color: #333;
          font-size: 0.9rem;
        }

        /* Input Fields */
        form input[type="text"],
        form input[type="password"] {
          width: 100%;
          padding: 12px 15px;
          margin-bottom: 20px;
          border: 2px solid #e0e0e0;
          border-radius: 10px;
          font-size: 0.95rem;
          transition: all 0.3s;
          box-sizing: border-box;
          font-family: inherit;
        }

        form input[type="text"]:focus,
        form input[type="password"]:focus {
          outline: none;
          border-color: #FFA500;
          box-shadow: 0 0 0 3px rgba(255, 165, 0, 0.1);
        }

        /* Submit Button */
        form input[type="submit"] {
          width: 100%;
          background: linear-gradient(135deg, #FFA500, #FF8C00);
          color: white;
          border: none;
          padding: 14px;
          border-radius: 40px;
          font-size: 1rem;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.3s;
          margin-bottom: 20px;
        }

        form input[type="submit"]:hover {
          transform: translateY(-2px);
          box-shadow: 0 5px 20px rgba(255, 165, 0, 0.3);
        }

        /* Register Link */
        form p {
          margin: 15px 0;
          font-size: 0.9rem;
          color: #666;
        }

        form p a {
          color: #FFA500;
          text-decoration: none;
          font-weight: 600;
        }

        form p a:hover {
          text-decoration: underline;
        }

        /* Divider */
        .divider {
          display: block;
          position: relative;
          text-align: center;
          margin: 20px 0;
          font-size: 0.85rem;
          color: #999;
        }

        .divider::before,
        .divider::after {
          content: '';
          position: absolute;
          top: 50%;
          width: 45%;
          height: 1px;
          background: #e0e0e0;
        }

        .divider::before {
          left: 0;
        }

        .divider::after {
          right: 0;
        }

        /* Google Login Button */
        .btn-login {
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
          padding: 12px;
          background: white;
          border: 2px solid #e0e0e0;
          border-radius: 40px;
          text-decoration: none;
          color: #333;
          font-weight: 500;
          font-size: 0.9rem;
          transition: all 0.3s;
          box-sizing: border-box;
        }

        .btn-login:hover {
          border-color: #FFA500;
          background: #fef9e6;
          transform: translateY(-2px);
          box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-login img {
          margin-right: 10px;
        }

        /* Animation */
        @keyframes fadeInUp {
          from {
            opacity: 0;
            transform: translateY(30px);
          }
          to {
            opacity: 1;
            transform: translateY(0);
          }
        }

        /* Responsive */
        @media (max-width: 480px) {
          form {
            padding: 30px 20px;
          }

          .icon {
            font-size: 2.5rem;
          }

          form input[type="text"],
          form input[type="password"] {
            padding: 10px 12px;
            font-size: 0.9rem;
          }

          form input[type="submit"] {
            padding: 12px;
          }

          .btn-login {
            padding: 10px;
          }
        }
    </style>
</head>
<body>
    <form action="" method="POST">

        {% csrf_token %}

        <div class="icon">
            <i class="fa-solid fa-lock"></i>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter your username" required>

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter your password" required>

        <input type="submit" value="Login">

        <p>Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
        <span class="divider">or</span>
        <a href="{% provider_login_url 'google' %}"
           class="btn-login">
            <img src="https://img.icons8.com/?size=100&id=17949&format=png&color=000000"
                alt="Google Icon" width="18" height="18" style="margin-right:8px;">
            Sign Up with Google
        </a>
    </form>
</body>
</html>
