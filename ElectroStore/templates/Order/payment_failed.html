<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroBazaar - Payment Failed</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-8 text-center transition-all">
        <div class="mx-auto flex items-center justify-center h-20 w-20 rounded-full bg-red-100 mb-6">
            <svg class="h-10 w-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Payment Failed</h1>

        <p class="text-gray-500 mb-6">
            Unfortunately, we couldn't process your payment. No charges were made.
        </p>

        <div class="bg-red-50 rounded-lg p-4 mb-8 text-left border border-red-100">
            <p class="text-sm text-red-700">
                <strong>Reason:</strong> {{ error_message|default:"Transaction declined or cancel by the user." }}
            </p>
            <p class="text-sm text-red-700 mt-2">
                Please check your card details, account balance, or try a different payment method.
            </p>
        </div>

        <div class="space-y-3">
            <a href="{% url 'checkout' %}" class="block w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Try Again
            </a>
            <a href="{% url 'home' %}" class="block w-full bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-lg transition duration-200">
                Cancel and Return Home
            </a>
        </div>
    </div>

</body>
</html>
